<!--
1) Start the HTML document.
   a) Use `<!DOCTYPE html>` to define the page as an HTML5 document.
   b) Open the `<html>` tag.

2) Create the head section.
   a) Set the page title as "My Game Profile".
   b) Add internal CSS using the `<style>` tag.

3) Style the webpage.
   a) Style the `body` with font, background, text alignment, and padding.
   b) Style the heading using `h1`.
   c) Style the button with colour, padding, border radius, and cursor.
   d) Style each `div` as a profile detail box.

4) Create the page content.
   a) Add the main heading.
   b) Add a button that calls `showProfile()` when clicked.
   c) Add profile rows for name, score, top score, rank, greeting, stars, bonus level, and team name.

5) Add JavaScript using the `<script>` tag.
   a) Create the `showProfile()` function.
   b) Store player details using variables.
   c) Use `null` and `undefined` for missing values.
   d) Compare the score with the high score.

6) Create the player rank.
   a) Use `if`, `else if`, and `else`.
   b) Assign Gold, Silver, or Bronze based on the score.

7) Create a time-based greeting.
   a) Use the Date object to get the current hour.
   b) Show morning, afternoon, or evening greeting.

8) Create stars using a while loop.
   a) Start with an empty stars variable.
   b) Keep adding stars until the count reaches 5.

9) Display the profile on the webpage.
   a) Use `document.getElementById()` to find each span.
   b) Use `innerHTML` to show the final values.

10) Close the `<script>`, `<body>`, and `<html>` tags to complete the webpage.
--><!DOCTYPE html>
<html>
   <head>
      <title>My Game Profile</title>
      <style>
         body {
            font-family: Arial, sans-serif;
            background-color: #04f570;
            text-align: center;
            padding: 20px;
         }
         h1 {
            color: #333;
         }
         button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
         }
         .profile-row {
            background-color: white;
            margin: 10px auto;
            padding: 10px;
            border-radius: 5px;
            width: 300px;
         }
      </style>
   </head>        
      <body>
         <h1>My Game Profile</h1>
         <button onclick="showProfile()">Show Profile</button>
         <div class="profile-row">Name: <span id="name">John Doe</span></div>
         <div class="profile-row">Score: <span id="score">75</span></div>
         <div class="profile-row">Top Score: <span id="topScore">100</span></div>
         <div class="profile-row">Rank: <span id="rank">N/A</span></div>
         <div class="profile-row">Greeting: <span id="greeting">Hello, John!</span></div>
         <div class="profile-row">Stars: <span id="stars">*****</span></div>
         <div class="profile-row">Bonus Level: <span id="bonusLevel">0</span></div>
         <div class="profile-row">Team Name: <span id="TeamName">N/A</span></div>
         <script>

            function showProfile() {
               var playerName = "Alex";
               var score = 75;
               var topScore = 100;
               var bonusLevel = null;
               var teamName = "AlexMasters";
               var rank;
            
               if (score >= 90) {
                  rank = "Gold";
               } else if (score >= 70) {
                  rank = "Silver";
               } else {
                  rank = "Bronze";
               }
               var currentHour = new Date().getHours();
               var greeting;
               if (currentHour < 12) {
                  greeting = "Good morning, " + playerName + "!";
               } else if (currentHour < 18) {
                  greeting = "Good afternoon, " + playerName + "!";
               } else {
                  greeting = "Good evening, " + playerName + "!";
               }
               var stars = "";
               var starCount = 0;
               if (score >= 100) {
                  stars = "*****";
               }
                else {
                 if (score >= 80) {
                     stars = "****";
             }
               else if (score >= 60) {
                  stars = "***";
               } else if (score >= 40) {
                  stars = "**";
               } else if (score >= 20) {
                  stars = "*";
               }
            }
               document.getElementById("name").innerHTML = playerName;
               document.getElementById("score").innerHTML = score;
               document.getElementById("topScore").innerHTML = topScore;
               document.getElementById("rank").innerHTML = rank;
               document.getElementById("greeting").innerHTML = greeting;
               document.getElementById("stars").innerHTML = stars;
               document.getElementById("bonusLevel").innerHTML = bonusLevel;
               document.getElementById("TeamName").innerHTML = teamName;
            }
         </script>
      </body> 
</html>
